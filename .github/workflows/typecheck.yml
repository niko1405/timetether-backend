name: TypeScript Typecheck

on:
  push:
    paths:
      - 'src/**/*.mts'
      - 'prisma/schema.prisma'
      - 'prisma.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/typecheck.yml'
  pull_request:
    paths:
      - 'src/**/*.mts'
      - 'prisma/schema.prisma'
      - 'prisma.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/typecheck.yml'

jobs:
  tsc:
    name: bunx tsc
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/timetether

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run typecheck
        run: bunx tsc
